<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Clear+Sans:wght@400;700&family=Libre+Franklin:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#ffffff; --border:#d3d6da; --text:#1a1a1b; --sub:#787c7e;
  --key-bg:#d3d6da; --absent:#787c7e; --present:#c9b458; --correct:#6aaa64;
  --tile-border:#d3d6da; --tile-border-filled:#878a8c; --modal-bg:#ffffff;
}
body { background:var(--bg); color:var(--text); font-family:"Clear Sans","Helvetica Neue",Arial,sans-serif; display:flex; flex-direction:column; min-height:100vh; }

/* HEADER */
header { border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 16px; height:50px; position:relative; }
.header-title { font-family:"Libre Franklin",sans-serif; font-weight:800; font-size:1.7rem; letter-spacing:.08rem; position:absolute; left:50%; transform:translateX(-50%); user-select:none; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.level-badge { font-size:.72rem; font-weight:700; background:var(--text); color:var(--bg); border-radius:4px; padding:3px 8px; letter-spacing:.05rem; }
.dark-btn { cursor:pointer; font-size:1.1rem; background:none; border:none; color:var(--text); padding:4px; }

/* LAYOUT */
main { display:flex; flex-direction:column; align-items:center; flex:1; padding:16px 16px 10px; gap:10px; max-width:500px; margin:0 auto; width:100%; }

/* LEVEL STRIP */
.level-strip { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
.level-btn { font-family:"Clear Sans",sans-serif; font-size:.72rem; font-weight:700; letter-spacing:.05rem; padding:4px 10px; border-radius:4px; border:2px solid var(--border); background:transparent; color:var(--sub); cursor:pointer; transition:all .15s; }
.level-btn:hover { border-color:var(--sub); color:var(--text); }
.level-btn.active { border-color:var(--text); color:var(--text); }
.level-btn.solved { border-color:var(--correct); color:var(--correct); }
.level-btn.failed { border-color:var(--absent); color:var(--absent); }

/* TOAST */
#toast-wrap { position:fixed; top:60px; left:50%; transform:translateX(-50%); z-index:999; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; }
.toast { background:var(--text); color:var(--bg); font-weight:700; font-size:.85rem; padding:10px 16px; border-radius:6px; letter-spacing:.03rem; animation:toastIn .15s ease, toastOut .3s ease 1.5s forwards; }
@keyframes toastIn  { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
@keyframes toastOut { from{opacity:1} to{opacity:0} }

/* BOARD */
#board-wrap { display:flex; justify-content:center; align-items:center; flex:1; }
#board { display:grid; gap:5px; }

/* TILES */
.tile { width:62px; height:62px; border:2px solid var(--tile-border); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700; text-transform:uppercase; color:var(--text); user-select:none; }
.tile[data-letter] { border-color:var(--tile-border-filled); }
.tile[data-state="correct"] { background:var(--correct); border-color:var(--correct); color:#fff; }
.tile[data-state="present"] { background:var(--present); border-color:var(--present); color:#fff; }
.tile[data-state="absent"]  { background:var(--absent);  border-color:var(--absent);  color:#fff; }
.tile.pop   { animation:pop .1s ease; }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }
.tile.shake { animation:shake .5s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 10%,50%,90%{transform:translateX(-4px)} 30%,70%{transform:translateX(4px)} }
.tile.flip-go   { animation:flipGo .25s ease forwards; }
.tile.flip-back { animation:flipBack .25s ease forwards; }
@keyframes flipGo   { from{transform:rotateX(0)}    to{transform:rotateX(-90deg)} }
@keyframes flipBack { from{transform:rotateX(-90deg)} to{transform:rotateX(0)} }

/* KEYBOARD */
#keyboard { width:100%; max-width:484px; }
.kb-row { display:flex; justify-content:center; gap:6px; margin-bottom:8px; }
.key { height:58px; min-width:43px; padding:0 4px; border-radius:4px; border:none; background:var(--key-bg); color:var(--text); font-family:"Clear Sans",sans-serif; font-size:.82rem; font-weight:700; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s,color .15s; user-select:none; -webkit-tap-highlight-color:transparent; }
.key.wide { min-width:65px; font-size:.75rem; }
.key[data-state="correct"] { background:var(--correct); color:#fff; }
.key[data-state="present"] { background:var(--present); color:#fff; }
.key[data-state="absent"]  { background:var(--absent);  color:#fff; }

/* GAME OVER MODAL */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
.overlay.show { opacity:1; pointer-events:auto; }
.modal { background:var(--modal-bg); border:1px solid var(--border); border-radius:12px; padding:28px 32px; width:90%; max-width:380px; text-align:center; transform:translateY(-12px); transition:transform .2s; }
.overlay.show .modal { transform:translateY(0); }
.modal h2 { font-family:"Libre Franklin",sans-serif; font-size:1.1rem; letter-spacing:.15rem; text-transform:uppercase; margin-bottom:6px; }
.answer-word { font-size:1.6rem; font-weight:800; letter-spacing:.1rem; margin:12px 0; color:var(--correct); }
.modal p { font-size:.85rem; color:var(--sub); margin-bottom:18px; }
.modal-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.btn { font-family:"Clear Sans",sans-serif; font-size:.85rem; font-weight:700; letter-spacing:.05rem; padding:14px 24px; border-radius:6px; border:none; cursor:pointer; text-transform:uppercase; }
.btn-green   { background:var(--correct); color:#fff; }
.btn-outline { background:transparent; border:2px solid var(--border); color:var(--text); }

/* ADD WORD MODAL */
.add-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:700; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
.add-overlay.show { opacity:1; pointer-events:auto; }
.add-modal { background:var(--modal-bg); border:1px solid var(--border); border-radius:12px; padding:26px 28px; width:90%; max-width:360px; text-align:center; transform:translateY(-10px); transition:transform .2s; }
.add-overlay.show .add-modal { transform:translateY(0); }
.add-modal h3 { font-family:"Libre Franklin",sans-serif; font-size:1rem; letter-spacing:.12rem; text-transform:uppercase; margin-bottom:10px; }
.add-modal p  { font-size:.84rem; color:var(--sub); margin-bottom:18px; line-height:1.6; }
.add-modal strong { color:var(--text); font-size:1.1rem; letter-spacing:.08rem; }
.add-modal-btns { display:flex; gap:10px; justify-content:center; }
.add-confirm-msg { margin-top:14px; font-size:.82rem; font-weight:700; color:var(--correct); display:none; }

/* DARK */
body.dark {
  --bg:#121213; --border:#3a3a3c; --text:#ffffff; --sub:#818384;
  --key-bg:#818384; --tile-border:#3a3a3c; --tile-border-filled:#565758; --modal-bg:#1a1a1b; --absent:#3a3a3c;
}
body.dark .key { color:#fff; }
@media(max-width:380px){
  .tile{width:52px;height:52px;font-size:1.6rem;}
  .key{min-width:32px;height:52px;font-size:.72rem;}
  .key.wide{min-width:48px;}
}
</style>
</head>
<body>

<header>
  <div class="header-title">Wordle</div>
  <div class="header-right">
    <span class="level-badge" id="hdr-level">LEVEL 1</span>
    <button class="dark-btn" id="dark-btn">🌙</button>
  </div>
</header>

<div id="toast-wrap"></div>

<main>
  <div class="level-strip" id="level-strip"></div>
  <div id="board-wrap"><div id="board"></div></div>
  <div id="keyboard"></div>
</main>

<!-- GAME OVER MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="m-title">Game Over</h2>
    <div class="answer-word" id="m-answer"></div>
    <p id="m-msg"></p>
    <div class="modal-btns">
      <button class="btn btn-green"   id="m-next">Next Level →</button>
      <button class="btn btn-outline" id="m-retry">Try Again</button>
    </div>
  </div>
</div>

<!-- ADD WORD MODAL -->
<div class="add-overlay" id="add-overlay">
  <div class="add-modal">
    <h3>Unknown Word</h3>
    <p>Is <strong id="add-word-display"></strong> a real English word?<br>Add it to accept it in future guesses.</p>
    <div class="add-modal-btns">
      <button class="btn btn-green"   id="btn-add-yes">Yes, add it</button>
      <button class="btn btn-outline" id="btn-add-no">No, cancel</button>
    </div>
    <div class="add-confirm-msg" id="add-confirm-msg">✓ Added! Submitting your guess...</div>
  </div>
</div>

// ── CUSTOM WORDS (persisted in localStorage) ──────────────────────────────────
const CUSTOM_WORDS = new Set(JSON.parse(localStorage.getItem('wordleCustomWords') || '[]'));
function saveCustomWords() {
  localStorage.setItem('wordleCustomWords', JSON.stringify([...CUSTOM_WORDS]));
}
function isValidWord(w) {
  return BUILTIN_WORDS.has(w) || CUSTOM_WORDS.has(w);
}

// ── LEVELS ────────────────────────────────────────────────────────────────────
const LEVELS = [
  { word:'crane',  maxGuesses:6 },
  { word:'blaze',  maxGuesses:6 },
  { word:'slump',  maxGuesses:6 },
  { word:'think',  maxGuesses:6 },
  { word:'froth',  maxGuesses:5 },
  { word:'quirk',  maxGuesses:5 },
  { word:'swamp',  maxGuesses:5 },
  { word:'glyph',  maxGuesses:5 },
  { word:'crypt',  maxGuesses:5 },
  { word:'fjord',  maxGuesses:5 },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let lvlIdx     = 0;
let curRow     = 0;
let curCol     = 0;
let curGuess   = [];
let active     = true;
let lvlStates  = LEVELS.map(() => null);
let lvlGuesses = LEVELS.map(() => []);
let pendingWord = null;  // word waiting for user confirmation in add-modal

// ── DOM REFS (set after DOMContentLoaded) ────────────────────────────────────
let elHdrLevel, elBoard, elKeyboard, elLevelStrip, elToastWrap;
let elOverlay, elMTitle, elMAnswer, elMMsg, elMNext, elMRetry;
let elAddOverlay, elAddWordDisplay, elBtnAddYes, elBtnAddNo, elAddConfirmMsg;

// ── BOOT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Cache all DOM refs
  elHdrLevel      = document.getElementById('hdr-level');
  elBoard         = document.getElementById('board');
  elKeyboard      = document.getElementById('keyboard');
  elLevelStrip    = document.getElementById('level-strip');
  elToastWrap     = document.getElementById('toast-wrap');
  elOverlay       = document.getElementById('overlay');
  elMTitle        = document.getElementById('m-title');
  elMAnswer       = document.getElementById('m-answer');
  elMMsg          = document.getElementById('m-msg');
  elMNext         = document.getElementById('m-next');
  elMRetry        = document.getElementById('m-retry');
  elAddOverlay    = document.getElementById('add-overlay');
  elAddWordDisplay= document.getElementById('add-word-display');
  elBtnAddYes     = document.getElementById('btn-add-yes');
  elBtnAddNo      = document.getElementById('btn-add-no');
  elAddConfirmMsg = document.getElementById('add-confirm-msg');

  // Wire events
  document.addEventListener('keydown', onKey);

  document.getElementById('dark-btn').onclick = () => {
    document.body.classList.toggle('dark');
    document.getElementById('dark-btn').textContent =
      document.body.classList.contains('dark') ? '☀️' : '🌙';
  };

  elMNext.onclick  = () => { hideGameModal(); const n = lvlIdx+1; if(n < LEVELS.length) loadLevel(n); else toast('🎉 All levels complete!'); };
  elMRetry.onclick = () => { hideGameModal(); retryLevel(); };

  elBtnAddYes.onclick = () => {
    if (!pendingWord) return;
    CUSTOM_WORDS.add(pendingWord);
    saveCustomWords();
    elAddConfirmMsg.style.display = 'block';
    elBtnAddYes.disabled = true;
    elBtnAddNo.disabled  = true;
    const word = pendingWord;
    setTimeout(() => {
      hideAddModal();
      processGuess(word);   // submit without re-checking word list
    }, 900);
  };

  elBtnAddNo.onclick = () => { hideAddModal(); };

  buildKeyboard();
  renderStrip();
  loadLevel(0);
});

// ── LEVEL MANAGEMENT ──────────────────────────────────────────────────────────
function loadLevel(idx) {
  lvlIdx   = idx;
  curRow   = lvlGuesses[idx].length;
  curCol   = 0;
  curGuess = [];
  active   = lvlStates[idx] === null;
  elHdrLevel.textContent = 'LEVEL ' + (idx + 1);
  renderStrip();
  buildBoard();
  rebuildKeys();
  lvlGuesses[idx].forEach((res, r) => {
    res.forEach(({letter, state}, c) => {
      const t = tile(r, c);
      t.textContent = letter.toUpperCase();
      t.setAttribute('data-letter', letter);
      t.setAttribute('data-state', state);
    });
  });
}

function retryLevel() {
  lvlStates[lvlIdx]  = null;
  lvlGuesses[lvlIdx] = [];
  loadLevel(lvlIdx);
}

// ── BOARD ─────────────────────────────────────────────────────────────────────
function buildBoard() {
  const {word, maxGuesses} = LEVELS[lvlIdx];
  elBoard.innerHTML = '';
  elBoard.style.gridTemplateColumns = `repeat(${word.length}, 62px)`;
  elBoard.style.gridTemplateRows    = `repeat(${maxGuesses}, 62px)`;
  for (let r = 0; r < maxGuesses; r++)
    for (let c = 0; c < word.length; c++) {
      const t = document.createElement('div');
      t.classList.add('tile');
      t.id = `t-${r}-${c}`;
      elBoard.appendChild(t);
    }
}
function tile(r, c) { return document.getElementById(`t-${r}-${c}`); }

// ── INPUT ─────────────────────────────────────────────────────────────────────
function onKey(e) {
  if (!active) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter')           { submitGuess(); return; }
  if (e.key === 'Backspace')       { deleteLetter(); return; }
  if (/^[a-zA-Z]$/.test(e.key))   { addLetter(e.key.toLowerCase()); }
}

function addLetter(letter) {
  if (curGuess.length >= LEVELS[lvlIdx].word.length) return;
  curGuess.push(letter);
  const t = tile(curRow, curCol);
  t.textContent = letter.toUpperCase();
  t.setAttribute('data-letter', letter);
  t.classList.remove('pop');
  void t.offsetWidth;
  t.classList.add('pop');
  curCol++;
}

function deleteLetter() {
  if (curGuess.length === 0) return;
  curGuess.pop();
  curCol--;
  const t = tile(curRow, curCol);
  t.textContent = '';
  t.removeAttribute('data-letter');
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
function submitGuess() {
  const wlen = LEVELS[lvlIdx].word.length;
  if (curGuess.length < wlen) { toast('Not enough letters'); shakeRow(curRow); return; }
  const guess = curGuess.join('');
  if (!isValidWord(guess)) {
    shakeRow(curRow);
    showAddModal(guess);
    return;
  }
  processGuess(guess);
}

// Called both from submitGuess (after validation) and from add-modal YES button
function processGuess(guess) {
  const {word, maxGuesses} = LEVELS[lvlIdx];
  const result = evaluate(guess, word);
  lvlGuesses[lvlIdx].push(result);
  // Make sure the tiles show the letters (in case processGuess called directly)
  for (let c = 0; c < guess.length; c++) {
    const t = tile(curRow, c);
    t.textContent = guess[c].toUpperCase();
    t.setAttribute('data-letter', guess[c]);
  }
  revealRow(curRow, result, () => {
    updateKeys(result);
    const won = result.every(r => r.state === 'correct');
    if (won) {
      lvlStates[lvlIdx] = 'solved';
      active = false;
      setTimeout(() => {
        renderStrip();
        const praise = ['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
        showGameModal(true, praise[curRow] ?? 'Nice!', word);
      }, 350);
    } else {
      curRow++; curCol = 0; curGuess = [];
      if (curRow >= maxGuesses) {
        lvlStates[lvlIdx] = 'failed';
        active = false;
        setTimeout(() => { renderStrip(); showGameModal(false, 'Better luck next time!', word); }, 350);
      }
    }
  });
}

// ── EVALUATE ──────────────────────────────────────────────────────────────────
function evaluate(guess, word) {
  const result    = guess.split('').map(letter => ({letter, state:'absent'}));
  const remaining = word.split('');
  for (let i = 0; i < word.length; i++) {
    if (guess[i] === word[i]) { result[i].state = 'correct'; remaining[i] = null; }
  }
  for (let i = 0; i < word.length; i++) {
    if (result[i].state === 'correct') continue;
    const idx = remaining.indexOf(guess[i]);
    if (idx !== -1) { result[i].state = 'present'; remaining[idx] = null; }
  }
  return result;
}

// ── REVEAL ANIMATION ──────────────────────────────────────────────────────────
function revealRow(row, result, done) {
  result.forEach(({state}, c) => {
    const t = tile(row, c);
    setTimeout(() => {
      t.classList.add('flip-go');
      t.addEventListener('animationend', function go() {
        t.removeEventListener('animationend', go);
        t.classList.remove('flip-go');
        t.setAttribute('data-state', state);
        t.classList.add('flip-back');
        t.addEventListener('animationend', function back() {
          t.removeEventListener('animationend', back);
          t.classList.remove('flip-back');
        }, {once:true});
      }, {once:true});
    }, c * 300);
  });
  setTimeout(done, result.length * 300 + 300);
}

function shakeRow(row) {
  for (let c = 0; c < LEVELS[lvlIdx].word.length; c++) {
    const t = tile(row, c);
    t.classList.remove('shake');
    void t.offsetWidth;
    t.classList.add('shake');
  }
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
const KB_ROWS = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['Enter','z','x','c','v','b','n','m','⌫']
];

function buildKeyboard() {
  elKeyboard.innerHTML = '';
  KB_ROWS.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.classList.add('kb-row');
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.classList.add('key');
      if (k === 'Enter' || k === '⌫') btn.classList.add('wide');
      btn.textContent = k === '⌫' ? '⌫' : k.toUpperCase();
      btn.dataset.key = k;
      btn.addEventListener('click', () => {
        if (!active) return;
        if (k === 'Enter') submitGuess();
        else if (k === '⌫') deleteLetter();
        else addLetter(k);
      });
      rowEl.appendChild(btn);
    });
    elKeyboard.appendChild(rowEl);
  });
}

function updateKeys(result) {
  const priority = {correct:3, present:2, absent:1};
  result.forEach(({letter, state}) => {
    const btn = elKeyboard.querySelector(`[data-key="${letter}"]`);
    if (!btn) return;
    const cur = btn.dataset.state;
    if (!cur || priority[state] > (priority[cur] || 0)) btn.dataset.state = state;
  });
}

function rebuildKeys() {
  elKeyboard.querySelectorAll('.key').forEach(b => delete b.dataset.state);
  lvlGuesses[lvlIdx].forEach(res => updateKeys(res));
}

// ── LEVEL STRIP ───────────────────────────────────────────────────────────────
function renderStrip() {
  elLevelStrip.innerHTML = '';
  LEVELS.forEach((_, i) => {
    const b = document.createElement('button');
    b.classList.add('level-btn');
    b.textContent = `L${i+1}`;
    if (i === lvlIdx)              b.classList.add('active');
    if (lvlStates[i] === 'solved') b.classList.add('solved');
    if (lvlStates[i] === 'failed') b.classList.add('failed');
    b.onclick = () => { hideGameModal(); loadLevel(i); };
    elLevelStrip.appendChild(b);
  });
}

// ── GAME OVER MODAL ───────────────────────────────────────────────────────────
function showGameModal(won, msg, answer) {
  elMTitle.textContent  = won ? '🎉 You got it!' : '😞 Game over';
  elMAnswer.textContent = answer.toUpperCase();
  elMMsg.textContent    = msg;
  elMNext.style.display = (lvlIdx + 1 < LEVELS.length) ? '' : 'none';
  elOverlay.classList.add('show');
}
function hideGameModal() { elOverlay.classList.remove('show'); }

// ── ADD WORD MODAL ────────────────────────────────────────────────────────────
function showAddModal(word) {
  pendingWord = word;
  elAddWordDisplay.textContent = word.toUpperCase();
  elAddConfirmMsg.style.display = 'none';
  elBtnAddYes.disabled = false;
  elBtnAddNo.disabled  = false;
  elAddOverlay.classList.add('show');
}
function hideAddModal() {
  elAddOverlay.classList.remove('show');
  pendingWord = null;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const d = document.createElement('div');
  d.classList.add('toast');
  d.textContent = msg;
  elToastWrap.appendChild(d);
  setTimeout(() => d.remove(), 2000);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wordle</title>
<link href="https://fonts.googleapis.com/css2?family=Clear+Sans:wght@400;700&family=Libre+Franklin:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fff;
  --border: #d3d6da;
  --text: #1a1a1b;
  --sub: #787c7e;
  --key-bg: #d3d6da;
  --absent: #787c7e;
  --present: #c9b458;
  --correct: #6aaa64;
  --tile-border: #d3d6da;
  --tile-filled: #878a8c;
  --modal-bg: #fff;
  --header-h: 50px;
  --strip-h: 36px;
  --kb-h: 198px; /* 3 rows × (key-h + gap) */
}

/* ── RESET / BASE ── */
html, body {
  height: 100%;
  overflow: hidden;       /* prevent ANY scroll on mobile */
  touch-action: manipulation;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header {
  flex: 0 0 var(--header-h);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  position: relative;
}
.header-title {
  font-family: "Libre Franklin", sans-serif;
  font-weight: 800;
  font-size: clamp(1.2rem, 5vw, 1.7rem);
  letter-spacing: .08rem;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  user-select: none;
  white-space: nowrap;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.level-badge {
  font-size: .68rem;
  font-weight: 700;
  background: var(--text);
  color: var(--bg);
  border-radius: 4px;
  padding: 3px 7px;
  letter-spacing: .05rem;
  white-space: nowrap;
}
.dark-btn {
  cursor: pointer;
  font-size: 1.1rem;
  background: none;
  border: none;
  color: var(--text);
  padding: 4px;
  line-height: 1;
}

/* ── LEVEL STRIP ── */
.level-strip-wrap {
  flex: 0 0 var(--strip-h);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 8px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.level-strip-wrap::-webkit-scrollbar { display: none; }
.level-strip {
  display: flex;
  gap: 5px;
  padding: 4px 2px;
  flex-shrink: 0;
}
.level-btn {
  font-size: .68rem;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 4px;
  border: 2px solid var(--border);
  background: transparent;
  color: var(--sub);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.level-btn.active { border-color: var(--text);    color: var(--text); }
.level-btn.solved { border-color: var(--correct); color: var(--correct); }
.level-btn.failed { border-color: var(--absent);  color: var(--absent); }

/* ── TOAST ── */
#toast-wrap {
  position: fixed;
  top: calc(var(--header-h) + var(--strip-h) + 8px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  pointer-events: none;
  width: 90%;
}
.toast {
  background: var(--text);
  color: var(--bg);
  font-weight: 700;
  font-size: .85rem;
  padding: 9px 16px;
  border-radius: 6px;
  text-align: center;
  animation: toastIn .15s ease, toastOut .3s ease 1.5s forwards;
}
@keyframes toastIn  { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
@keyframes toastOut { from{opacity:1} to{opacity:0} }

/* ── BOARD AREA ── */
#board-wrap {
  flex: 1 1 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 6px 8px;
}
#board {
  display: grid;
  gap: 5px;
}

/* ── TILES ── */
.tile {
  border: 2px solid var(--tile-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text);
  user-select: none;
  /* size set dynamically by JS */
}
.tile[data-letter]          { border-color: var(--tile-filled); }
.tile[data-state="correct"] { background: var(--correct); border-color: var(--correct); color: #fff; }
.tile[data-state="present"] { background: var(--present); border-color: var(--present); color: #fff; }
.tile[data-state="absent"]  { background: var(--absent);  border-color: var(--absent);  color: #fff; }

.tile.pop   { animation: pop .1s ease; }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }
.tile.shake { animation: shake .45s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }
.tile.flip-go   { animation: flipGo .22s ease forwards; }
.tile.flip-back { animation: flipBack .22s ease forwards; }
@keyframes flipGo   { from{transform:rotateX(0)}     to{transform:rotateX(-90deg)} }
@keyframes flipBack { from{transform:rotateX(-90deg)} to{transform:rotateX(0)} }

/* ── KEYBOARD ── */
#keyboard {
  flex: 0 0 auto;
  width: 100%;
  padding: 0 4px 8px;
  /* never shrinks — board shrinks instead */
}
.kb-row {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-bottom: 5px;
}
.key {
  flex: 1;
  max-width: 46px;
  height: 56px;
  border-radius: 4px;
  border: none;
  background: var(--key-bg);
  color: var(--text);
  font-family: "Clear Sans", sans-serif;
  font-size: .82rem;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background .1s, color .1s;
  /* prevent text selection on repeated taps */
  -webkit-touch-callout: none;
}
.key.wide { max-width: 68px; font-size: .72rem; }
.key[data-state="correct"] { background: var(--correct); color: #fff; }
.key[data-state="present"] { background: var(--present); color: #fff; }
.key[data-state="absent"]  { background: var(--absent);  color: #fff; }

/* shrink keyboard on very small screens */
@media (max-height: 620px) {
  .key { height: 46px; font-size: .74rem; }
  .key.wide { font-size: .64rem; }
  .kb-row { gap: 4px; margin-bottom: 4px; }
}
@media (max-height: 520px) {
  .key { height: 40px; }
}

/* ── SHARED OVERLAY / MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.overlay.show { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--modal-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 26px 24px 22px;
  width: 88%;
  max-width: 360px;
  text-align: center;
  transform: translateY(-10px);
  transition: transform .2s;
}
.overlay.show .modal { transform: translateY(0); }
.modal h2 {
  font-family: "Libre Franklin", sans-serif;
  font-size: 1rem;
  letter-spacing: .15rem;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.answer-word {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: .1rem;
  margin: 10px 0;
  color: var(--correct);
}
.modal > p { font-size: .82rem; color: var(--sub); margin-bottom: 16px; }
.modal-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn {
  font-family: "Clear Sans", sans-serif;
  font-size: .82rem;
  font-weight: 700;
  letter-spacing: .05rem;
  padding: 13px 20px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  text-transform: uppercase;
  -webkit-tap-highlight-color: transparent;
}
.btn-green   { background: var(--correct); color: #fff; }
.btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }

/* ── ADD-WORD MODAL ── */
.add-overlay { z-index: 700; }
.add-modal h3 {
  font-family: "Libre Franklin", sans-serif;
  font-size: 1rem;
  letter-spacing: .12rem;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.add-modal p  { font-size: .83rem; color: var(--sub); margin-bottom: 16px; line-height: 1.6; }
.add-modal strong { color: var(--text); font-size: 1.05rem; letter-spacing: .06rem; }
.add-confirm-msg { margin-top: 12px; font-size: .8rem; font-weight: 700; color: var(--correct); display: none; }

/* ── DARK MODE ── */
body.dark {
  --bg: #121213;
  --border: #3a3a3c;
  --text: #ffffff;
  --sub: #818384;
  --key-bg: #818384;
  --tile-border: #3a3a3c;
  --tile-filled: #565758;
  --modal-bg: #1a1a1b;
  --absent: #3a3a3c;
}
body.dark .key { color: #fff; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">Wordle</div>
  <div class="header-right">
    <span class="level-badge" id="hdr-level">LEVEL 1</span>
    <button class="dark-btn" id="dark-btn">🌙</button>
  </div>
</header>

<!-- LEVEL STRIP -->
<div class="level-strip-wrap">
  <div class="level-strip" id="level-strip"></div>
</div>

<!-- TOAST -->
<div id="toast-wrap"></div>

<!-- BOARD -->
<div id="board-wrap">
  <div id="board"></div>
</div>

<!-- KEYBOARD -->
<div id="keyboard"></div>

<!-- GAME OVER MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="m-title">Game Over</h2>
    <div class="answer-word" id="m-answer"></div>
    <p id="m-msg"></p>
    <div class="modal-btns">
      <button class="btn btn-green"   id="m-next">Next Level →</button>
      <button class="btn btn-outline" id="m-retry">Try Again</button>
    </div>
  </div>
</div>

<!-- ADD WORD MODAL -->
<div class="overlay add-overlay" id="add-overlay">
  <div class="modal add-modal">
    <h3>Unknown Word</h3>
    <p>Is <strong id="add-word-display"></strong> a real English word?<br>Add it to accept it in future guesses.</p>
    <div class="modal-btns">
      <button class="btn btn-green"   id="btn-add-yes">Yes, add it</button>
      <button class="btn btn-outline" id="btn-add-no">No, cancel</button>
    </div>
    <div class="add-confirm-msg" id="add-confirm-msg">✓ Added! Submitting your guess...</div>
  </div>
</div>

function saveCustomWords() {
  localStorage.setItem('wordleCustomWords', JSON.stringify([...CUSTOM_WORDS]));
}
function isValidWord(w) { return BUILTIN_WORDS.has(w) || CUSTOM_WORDS.has(w); }

// ── LEVELS ────────────────────────────────────────────────────────────────────
const LEVELS = [
  { word:'crane',  maxGuesses:6 },
  { word:'blaze',  maxGuesses:6 },
  { word:'slump',  maxGuesses:6 },
  { word:'think',  maxGuesses:6 },
  { word:'froth',  maxGuesses:5 },
  { word:'quirk',  maxGuesses:5 },
  { word:'swamp',  maxGuesses:5 },
  { word:'glyph',  maxGuesses:5 },
  { word:'crypt',  maxGuesses:5 },
  { word:'fjord',  maxGuesses:5 },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let lvlIdx = 0, curRow = 0, curCol = 0, curGuess = [], active = true, pendingWord = null;
let lvlStates  = LEVELS.map(() => null);
let lvlGuesses = LEVELS.map(() => []);

// ── DOM REFS ──────────────────────────────────────────────────────────────────

// ── TILE SIZE (computed to fill available space) ───────────────────────────────
function tileSize(wordLen, maxGuesses) {
  // Available space: viewport minus header, strip, keyboard, gaps
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const headerH = 50;
  const stripH  = 36;
  const kbH     = document.getElementById('keyboard')
                    ? document.getElementById('keyboard').offsetHeight || 198
                    : 198;
  const padV    = 16; // top+bottom padding in board-wrap
  const padH    = 16;
  const gap     = 5;
  const availH  = vh - headerH - stripH - kbH - padV - gap * (maxGuesses - 1);
  const availW  = vw - padH - gap * (wordLen - 1);
  const fromH   = Math.floor(availH / maxGuesses);
  const fromW   = Math.floor(availW / wordLen);
  return Math.min(fromH, fromW, 62); // never bigger than desktop size
}

// ── LEVEL MANAGEMENT ──────────────────────────────────────────────────────────
function loadLevel(idx) {
  lvlIdx   = idx;
  curRow   = lvlGuesses[idx].length;
  curCol   = 0;
  curGuess = [];
  active   = lvlStates[idx] === null;
  elHdrLevel.textContent = 'LEVEL ' + (idx + 1);
  renderStrip();
  buildBoard();
  rebuildKeys();
  lvlGuesses[idx].forEach((res, r) => {
    res.forEach(({letter, state}, c) => {
      const t = tile(r, c);
      t.textContent = letter.toUpperCase();
      t.setAttribute('data-letter', letter);
      t.setAttribute('data-state', state);
    });
  });
}
function retryLevel() { lvlStates[lvlIdx] = null; lvlGuesses[lvlIdx] = []; loadLevel(lvlIdx); }

// ── BOARD ─────────────────────────────────────────────────────────────────────
function buildBoard() {
  const {word, maxGuesses} = LEVELS[lvlIdx];
  elBoard.innerHTML = '';
  const sz = tileSize(word.length, maxGuesses);
  const fs = Math.round(sz * 0.52);
  elBoard.style.gridTemplateColumns = `repeat(${word.length}, ${sz}px)`;
  elBoard.style.gridTemplateRows    = `repeat(${maxGuesses}, ${sz}px)`;
  for (let r = 0; r < maxGuesses; r++)
    for (let c = 0; c < word.length; c++) {
      const t = document.createElement('div');
      t.classList.add('tile');
      t.id = `t-${r}-${c}`;
      t.style.width     = sz + 'px';
      t.style.height    = sz + 'px';
      t.style.fontSize  = fs + 'px';
      elBoard.appendChild(t);
    }
}
function tile(r, c) { return document.getElementById(`t-${r}-${c}`); }

// ── INPUT ─────────────────────────────────────────────────────────────────────
function onKey(e) {
  if (!active) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter')         { submitGuess(); return; }
  if (e.key === 'Backspace')     { deleteLetter(); return; }
  if (/^[a-zA-Z]$/.test(e.key)) { addLetter(e.key.toLowerCase()); }
}
function addLetter(letter) {
  if (curGuess.length >= LEVELS[lvlIdx].word.length) return;
  curGuess.push(letter);
  const t = tile(curRow, curCol);
  t.textContent = letter.toUpperCase();
  t.setAttribute('data-letter', letter);
  t.classList.remove('pop'); void t.offsetWidth; t.classList.add('pop');
  curCol++;
}
function deleteLetter() {
  if (!curGuess.length) return;
  curGuess.pop(); curCol--;
  const t = tile(curRow, curCol);
  t.textContent = ''; t.removeAttribute('data-letter');
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
function submitGuess() {
  const wlen = LEVELS[lvlIdx].word.length;
  if (curGuess.length < wlen) { toast('Not enough letters'); shakeRow(curRow); return; }
  const guess = curGuess.join('');
  if (!isValidWord(guess)) { shakeRow(curRow); showAddModal(guess); return; }
  processGuess(guess);
}
function processGuess(guess) {
  const {word, maxGuesses} = LEVELS[lvlIdx];
  const result = evaluate(guess, word);
  lvlGuesses[lvlIdx].push(result);
  for (let c = 0; c < guess.length; c++) {
    const t = tile(curRow, c);
    t.textContent = guess[c].toUpperCase();
    t.setAttribute('data-letter', guess[c]);
  }
  revealRow(curRow, result, () => {
    updateKeys(result);
    if (result.every(r => r.state === 'correct')) {
      lvlStates[lvlIdx] = 'solved'; active = false;
      setTimeout(() => { renderStrip(); showGameModal(true, ['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'][curRow] ?? 'Nice!', word); }, 350);
    } else {
      curRow++; curCol = 0; curGuess = [];
      if (curRow >= maxGuesses) {
        lvlStates[lvlIdx] = 'failed'; active = false;
        setTimeout(() => { renderStrip(); showGameModal(false, 'Better luck next time!', word); }, 350);
      }
    }
  });
}

// ── EVALUATE ──────────────────────────────────────────────────────────────────
function evaluate(guess, word) {
  const result = guess.split('').map(l => ({letter:l, state:'absent'}));
  const rem    = word.split('');
  for (let i = 0; i < word.length; i++)
    if (guess[i] === word[i]) { result[i].state = 'correct'; rem[i] = null; }
  for (let i = 0; i < word.length; i++) {
    if (result[i].state === 'correct') continue;
    const j = rem.indexOf(guess[i]);
    if (j !== -1) { result[i].state = 'present'; rem[j] = null; }
  }
  return result;
}

// ── REVEAL ────────────────────────────────────────────────────────────────────
function revealRow(row, result, done) {
  result.forEach(({state}, c) => {
    setTimeout(() => {
      const t = tile(row, c);
      t.classList.add('flip-go');
      t.addEventListener('animationend', function go() {
        t.removeEventListener('animationend', go);
        t.classList.remove('flip-go');
        t.setAttribute('data-state', state);
        t.classList.add('flip-back');
        t.addEventListener('animationend', function back() {
          t.removeEventListener('animationend', back);
          t.classList.remove('flip-back');
        }, {once:true});
      }, {once:true});
    }, c * 280);
  });
  setTimeout(done, result.length * 280 + 280);
}
function shakeRow(row) {
  for (let c = 0; c < LEVELS[lvlIdx].word.length; c++) {
    const t = tile(row, c); t.classList.remove('shake'); void t.offsetWidth; t.classList.add('shake');
  }
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
const KB_ROWS = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['Enter','z','x','c','v','b','n','m','⌫']
];
function buildKeyboard() {
  elKeyboard.innerHTML = '';
  KB_ROWS.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.classList.add('kb-row');
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.classList.add('key');
      if (k === 'Enter' || k === '⌫') btn.classList.add('wide');
      btn.textContent = k === '⌫' ? '⌫' : k.toUpperCase();
      btn.dataset.key = k;
      // Use touchstart for instant mobile response, fall back to click
      const fire = () => { if (!active) return; if (k==='Enter') submitGuess(); else if (k==='⌫') deleteLetter(); else addLetter(k); };
      btn.addEventListener('touchstart', e => { e.preventDefault(); fire(); }, {passive:false});
      btn.addEventListener('click', fire);
      rowEl.appendChild(btn);
    });
    elKeyboard.appendChild(rowEl);
  });
}
function updateKeys(result) {
  const p = {correct:3, present:2, absent:1};
  result.forEach(({letter, state}) => {
    const b = elKeyboard.querySelector(`[data-key="${letter}"]`);
    if (!b) return;
    if (!b.dataset.state || p[state] > (p[b.dataset.state] || 0)) b.dataset.state = state;
  });
}
function rebuildKeys() {
  elKeyboard.querySelectorAll('.key').forEach(b => delete b.dataset.state);
  lvlGuesses[lvlIdx].forEach(res => updateKeys(res));
}

// ── LEVEL STRIP ───────────────────────────────────────────────────────────────
function renderStrip() {
  elLevelStrip.innerHTML = '';
  LEVELS.forEach((_, i) => {
    const b = document.createElement('button');
    b.classList.add('level-btn');
    b.textContent = `L${i+1}`;
    if (i === lvlIdx)              b.classList.add('active');
    if (lvlStates[i] === 'solved') b.classList.add('solved');
    if (lvlStates[i] === 'failed') b.classList.add('failed');
    b.onclick = () => { hideGameModal(); loadLevel(i); };
    elLevelStrip.appendChild(b);
  });
  // Scroll active button into view
  setTimeout(() => {
    const active = elLevelStrip.querySelector('.active');
    if (active) active.scrollIntoView({inline:'center', behavior:'smooth'});
  }, 50);
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function showGameModal(won, msg, answer) {
  elMTitle.textContent  = won ? '🎉 You got it!' : '😞 Game over';
  elMAnswer.textContent = answer.toUpperCase();
  elMMsg.textContent    = msg;
  elMNext.style.display = lvlIdx + 1 < LEVELS.length ? '' : 'none';
  elOverlay.classList.add('show');
}
function hideGameModal() { elOverlay.classList.remove('show'); }

function showAddModal(word) {
  pendingWord = word;
  elAddWordDisplay.textContent = word.toUpperCase();
  elAddConfirmMsg.style.display = 'none';
  elBtnAddYes.disabled = false;
  elBtnAddNo.disabled  = false;
  elAddOverlay.classList.add('show');
}
function hideAddModal() { elAddOverlay.classList.remove('show'); pendingWord = null; }

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const d = document.createElement('div');
  d.classList.add('toast'); d.textContent = msg;
  elToastWrap.appendChild(d);
  setTimeout(() => d.remove(), 2000);
}
</script>
